# ============================================================
# AuditVault — Application Configuration
# ============================================================

spring.application.name=auditvault

# ---- Database (PostgreSQL for prod, H2 for local dev) ------
spring.datasource.url=${DB_URL:jdbc:h2:mem:auditvault;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA / Hibernate ------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# ---- Flyway Migrations ----------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ---- JWT ------------------------------------------------
app.jwt.secret=${JWT_SECRET:myDefaultDevSecretKeyThatIsAtLeast256BitsLong123456}
app.jwt.expiration-ms=86400000

# ---- Server ---------------------------------------------
server.port=${PORT:8080}
server.servlet.context-path=/api/v1
